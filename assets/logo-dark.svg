<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80" role="img" aria-label="SNATCH">
  <style>
    .letter { fill: #e6edf3; }
    .dot { fill: #58a6ff; }
  </style>
  <!-- S -->
  <rect x="0" y="10" width="50" height="10" class="letter"/>
  <rect x="0" y="10" width="10" height="20" class="letter"/>
  <rect x="0" y="30" width="50" height="10" class="letter"/>
  <rect x="40" y="30" width="10" height="20" class="letter"/>
  <rect x="0" y="50" width="50" height="10" class="letter"/>
  <!-- N -->
  <rect x="70" y="10" width="10" height="60" class="letter"/>
  <rect x="80" y="20" width="10" height="10" class="letter"/>
  <rect x="90" y="30" width="10" height="10" class="letter"/>
  <rect x="100" y="10" width="10" height="60" class="letter"/>
  <!-- A -->
  <rect x="130" y="20" width="10" height="50" class="letter"/>
  <rect x="140" y="10" width="30" height="10" class="letter"/>
  <rect x="160" y="20" width="10" height="50" class="letter"/>
  <rect x="140" y="40" width="30" height="10" class="letter"/>
  <!-- T -->
  <rect x="190" y="10" width="50" height="10" class="letter"/>
  <rect x="210" y="10" width="10" height="60" class="letter"/>
  <!-- C -->
  <rect x="260" y="10" width="50" height="10" class="letter"/>
  <rect x="260" y="10" width="10" height="60" class="letter"/>
  <rect x="260" y="60" width="50" height="10" class="letter"/>
  <!-- H -->
  <rect x="330" y="10" width="10" height="60" class="letter"/>
  <rect x="340" y="40" width="30" height="10" class="letter"/>
  <rect x="370" y="10" width="10" height="60" class="letter"/>
  <!-- accent dots -->
  <circle cx="410" cy="40" r="5" class="dot"/>
  <circle cx="430" cy="40" r="5" class="dot"/>
  <circle cx="450" cy="40" r="5" class="dot"/>
</svg>
